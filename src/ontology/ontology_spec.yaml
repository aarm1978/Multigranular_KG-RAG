# =============================================================================
# Notes carried from the inventory (for build_ontology.py and reviewers):
#  - D-06 product hub aggregation is realized by: catalogs (C-DC17) + hasComponent
#    (C-DC19) + implementedBy (D-22) + describedInPaper (D-23) + documentedBy
#    (D-25), the inverse of describes (D-24).
#  - D-20 (archivedAs) resolution rule: link a Zenodo-DOI stub to a curated repo
#    only where the cross-identifier matches; never infer by name.
#  - Cited-DOI typing rule (citation extractor): a software/dataset DOI in the
#    reference list -> Tool/Repository/DatasetResource stub, not a Paper stub.
#  - hasAuthor/hasCreator/hasContributor are the module-level realizations of the
#    agent relations (C-P01, C-D03, C-C04, C-DC05).
# =============================================================================
